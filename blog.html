<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>总览 — Share Everything</title>
    <meta name="description" content="探索所有文章，按分类浏览，搜索你感兴趣的内容。" />
    <meta property="og:title" content="总览 — Share Everything" />
    <meta property="og:description" content="探索所有文章，按分类浏览，搜索你感兴趣的内容。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.0000068.xyz/blog.html" />
    <link rel="preconnect" href="https://fonts.googleapis.cn" />
    <link rel="preconnect" href="https://fonts.gstatic.cn" crossorigin />
    <link
      href="https://fonts.googleapis.cn/css2?family=Inter:wght@300;400;500;600;700&family=Google+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
      media="print"
      data-deferred-fonts
    />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.cn/css2?family=Inter:wght@300;400;500;600;700&family=Google+Sans:wght@400;500;700&display=swap" /></noscript>
    <script src="js/font-loader.js" defer></script>
    <link rel="icon" type="image/png" href="favicon.png?v=2" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="blog">
    <!-- Cursor Glow -->
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- Ambient Background -->
    <div class="ambient-background">
      <div class="glow-orb orb-1"></div>
      <div class="glow-orb orb-2"></div>
      <div class="glow-orb orb-3"></div>
    </div>

    <!-- Particles -->
    <canvas id="particles-canvas"></canvas>

    <main id="spa-content">
    <!-- Top Actions -->
    <div class="top-actions" id="topActions">
      <a href="index.html" class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <span>首页</span>
      </a>
      <a href="blog.html" class="action-btn active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
        </svg>
        <span>总览</span>
      </a>
      <a href="blog.html?category=收藏" class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
        </svg>
        <span>收藏</span>
      </a>
    </div>

    <!-- Page Transition Wrapper -->
    <div class="page-transition-wrapper" id="pageWrapper">
      <!-- Content -->
      <div class="page-container">
        <div class="page-header">
          <h1 class="page-title">总览</h1>
        </div>

      <!-- Search -->
      <div class="blog-search">
        <input type="text" id="blogSearch" placeholder="搜索文章标题、摘要或标签..." aria-label="搜索文章" />
        <svg
          class="search-icon"
          aria-hidden="true"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
      </div>

      <!-- Category Filters -->
      <div class="blog-filters" id="blogFilters"></div>

      <!-- Blog Grid -->
      <div class="blog-grid" id="blogGrid"></div>

      <!-- Empty State -->
      <div class="empty-state" id="emptyState" style="display: none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <p>没有找到匹配的文章</p>
        <p style="font-size: 0.85rem;">试试其他关键词或分类</p>
      </div>

      <!-- Pagination -->
      <div class="pagination" id="pagination"></div>
    </div>
    </div> <!-- End Page Transition Wrapper -->
    </main>

    <script src="js/common.js"></script>
    <script src="js/notion-api.js"></script>
    <script src="js/bookmark.js"></script>
    <script src="js/blog-page.js"></script>
  </body>
</html>
