<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文章 — Share Everything</title>
    <meta name="description" content="阅读文章详情" />
    <meta property="og:title" content="Share Everything" />
    <meta property="og:description" content="阅读文章详情" />
    <meta property="og:type" content="article" />
    <meta property="og:url" content="https://www.0000068.xyz/post.html" />
    <link rel="preconnect" href="https://fonts.googleapis.cn" />
    <link rel="preconnect" href="https://fonts.gstatic.cn" crossorigin />
    <link
      href="https://fonts.googleapis.cn/css2?family=Inter:wght@300;400;500;600;700&family=Google+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
      media="print"
      data-deferred-fonts
    />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.cn/css2?family=Inter:wght@300;400;500;600;700&family=Google+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" /></noscript>
    <script src="js/font-loader.js" defer></script>
    <link rel="icon" type="image/png" href="favicon.png?v=2" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="post">
    <!-- Cursor Glow -->
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- Ambient Background -->
    <div class="ambient-background">
      <div class="glow-orb orb-1"></div>
      <div class="glow-orb orb-2"></div>
      <div class="glow-orb orb-3"></div>
    </div>

    <!-- Particles -->
    <canvas id="particles-canvas"></canvas>

    <main id="spa-content">
    <!-- Top Actions -->
    <div class="top-actions" id="topActions">
      <a href="index.html" class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <span>首页</span>
      </a>
      <a href="blog.html" class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
        </svg>
        <span>总览</span>
      </a>
      <a href="blog.html?category=收藏" class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
        </svg>
        <span>收藏</span>
      </a>
      <button class="action-btn action-btn-bookmark" id="navBookmark" type="button" aria-label="收藏文章" title="收藏文章">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
        </svg>
      </button>
    </div>

    <!-- Page Transition Wrapper -->
    <div class="page-transition-wrapper" id="pageWrapper">
    <!-- Content -->
    <div class="post-container">
      <article class="post-article" id="postArticle">
        <!-- Back -->
        <button class="post-back" id="postBack" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          返回列表
        </button>

        <!-- Loading Skeleton -->
        <div id="postSkeleton">
          <div class="skeleton" style="width: 80px; height: 24px; margin-bottom: 20px;"></div>
          <div class="skeleton" style="width: 100%; height: 48px; margin-bottom: 12px;"></div>
          <div class="skeleton" style="width: 60%; height: 48px; margin-bottom: 24px;"></div>
          <div class="skeleton" style="width: 200px; height: 20px; margin-bottom: 48px;"></div>
          <div class="skeleton" style="width: 100%; height: 300px; margin-bottom: 32px;"></div>
          <div class="skeleton" style="width: 100%; height: 20px; margin-bottom: 12px;"></div>
          <div class="skeleton" style="width: 90%; height: 20px; margin-bottom: 12px;"></div>
          <div class="skeleton" style="width: 75%; height: 20px; margin-bottom: 12px;"></div>
        </div>

        <!-- Post Content (rendered by JS) -->
        <div id="postContent" style="display: none;"></div>
      </article>

    <!-- Floating Bookmark Button -->
    <button class="fab-bookmark" id="fabBookmark" style="display: none;" aria-label="收藏文章">
      <svg class="fab-bookmark-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
      </svg>
      <span class="fab-bookmark-label">收藏</span>
    </button>

    <!-- Empty State -->
    <div class="empty-state" id="postEmpty" style="display: none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
      </svg>
      <p>文章不存在</p>
      <p style="font-size: 0.85rem;">
        <a href="blog.html" style="color: var(--accent-cyan); text-decoration: none;">返回博客列表</a>
      </p>
    </div>
    </div> <!-- End Page Transition Wrapper -->
    </main>

    <script src="js/common.js"></script>
    <script src="js/notion-api.js"></script>
    <script src="js/bookmark.js"></script>
    <script src="js/post-page.js"></script>
  </body>
</html>
